<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>breathe</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      width: 100%; height: 100%;
      background: #070708;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── two-ring circle ── */
    .circle-wrap {
      position: relative;
      width: 230px;
      height: 230px;
      margin-bottom: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(195, 190, 240, 0.17);
      box-shadow: 0 0 55px rgba(160, 150, 220, 0.05), inset 0 0 40px rgba(160, 150, 220, 0.03);
      animation: ring-out 8s ease-in-out infinite;
    }

    .ring-inner {
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px solid rgba(195, 190, 240, 0.08);
      animation: ring-in 8s ease-in-out infinite;
    }

    @keyframes ring-out {
      0%   { transform: scale(0.84); opacity: 0.4; }
      45%  { transform: scale(1.00); opacity: 1;   }
      55%  { transform: scale(1.00); opacity: 1;   }
      100% { transform: scale(0.84); opacity: 0.4; }
    }

    @keyframes ring-in {
      0%   { transform: scale(1.14); opacity: 0.5; }
      45%  { transform: scale(0.86); opacity: 1;   }
      55%  { transform: scale(0.86); opacity: 1;   }
      100% { transform: scale(1.14); opacity: 0.5; }
    }

    /* inhale / exhale centered in circle */
    .breath-label {
      position: absolute;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #484860;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 300;
    }

    .breath-label.inhale { animation: show-inhale 8s ease-in-out infinite; }
    .breath-label.exhale { animation: show-exhale 8s ease-in-out infinite; }

    @keyframes show-inhale {
      0%   { opacity: 0; }
      5%   { opacity: 1; }
      43%  { opacity: 1; }
      48%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes show-exhale {
      0%   { opacity: 0.9; }
      5%   { opacity: 0;   }
      54%  { opacity: 0;   }
      59%  { opacity: 0.9; }
      100% { opacity: 0.9; }
    }

    /* ── phrase crossfade ── */
    .phrase-wrap {
      position: relative;
      height: 84px;
      width: 100%;
      max-width: 580px;
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phrase {
      position: absolute;
      width: calc(100% - 96px);
      font-size: 16px;
      line-height: 1.8;
      text-align: center;
      color: #787888;
      letter-spacing: 0.01em;
      font-style: italic;
      opacity: 0;
      filter: blur(7px);
      transform: scale(0.96);
      transition: opacity 2.4s ease, filter 2.4s ease, transform 2.4s ease;
      pointer-events: none;
    }

    .phrase.active {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    /* ── mute button ── */
    .mute-btn {
      position: fixed;
      top: 28px;
      right: 32px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 300;
      color: #4a4a62;
      padding: 6px 0;
      opacity: 0;
      transition: opacity 0.8s ease, color 0.3s ease;
    }

    .mute-btn.visible { opacity: 1; }
    .mute-btn:hover { color: #7a7a96; }

    /* ── start prompt ── */
    .start-prompt {
      position: fixed;
      bottom: 64px;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: #4a4a5e;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 300;
      transition: opacity 2s ease;
    }

    .start-prompt.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── footer ── */
    .footer {
      position: fixed;
      bottom: 28px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #3e3e52;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 300;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .footer.visible { opacity: 1; }

    /* ── film grain ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      opacity: 0.55;
    }
  </style>
</head>
<body>

  <audio id="ambient" src="breathe_audio.mp3" loop preload="auto"></audio>

  <button class="mute-btn" id="mute-btn" aria-label="Toggle sound">sound on</button>

  <div class="circle-wrap">
    <div class="ring"></div>
    <div class="ring-inner"></div>
    <div class="breath-label inhale">inhale</div>
    <div class="breath-label exhale">exhale</div>
  </div>

  <div class="phrase-wrap">
    <p class="phrase" id="phrase-a"></p>
    <p class="phrase" id="phrase-b"></p>
  </div>

  <div class="start-prompt" id="start-prompt">— touch to begin —</div>
  <div class="footer" id="footer">no tracking &nbsp;&middot;&nbsp; no agenda &nbsp;&middot;&nbsp; no next step</div>

  <script>
    const phrases = [
      // the system
      "The scroll never ends because ending would mean confronting what's underneath",
      "You are not distracted — you are being distracted",
      "The feed is engineered to feel like life",
      "Outrage is the cheapest form of engagement and the most reliably harvested",
      "The market has colonized the interior",
      "Comfort has been optimized — meaning has not",
      "The promoted life is not a life — it is a demonstration of one",
      "You are simultaneously the product and the consumer",
      "Busyness is the acceptable face of emptiness",
      "The noise is not incidental — it is the point",
      // the emptiness
      "The hollowness is systemic, not personal",
      "The emptiness is not a bug — it is the design",
      "What you're running from isn't behind you",
      "There is no self-help solution to a structural problem",
      "The void doesn't go away when you stop looking — it gets louder",
      "Spiritual asthma: the sensation of suffocating in plain air",
      "You didn't fail the system — the system failed to be worth succeeding in",
      // the rush
      "The urgency is real — the emergency is manufactured",
      "Speed is how we avoid the question that speed was supposed to answer",
      "The adrenaline is not aliveness — it is the substitute for it",
      "You are not behind — you are being told you are behind",
      "Productivity is the secular answer to the sacred question",
      "We have confused motion for direction for so long we've forgotten they're different",
      // the body & breath
      "The body keeps noticing what the mind has agreed to ignore",
      "Breathing slowly is inconvenient for a fast-moving economy",
      "The breath was here before the noise and will be here after",
      "Something in you knows the difference between alive and performing alive",
      "This is what a body feels like when it isn't performing",
      // identity & commerce
      "You were given a self before you were given a brand",
      "Authenticity has been packaged and sold back to you at a markup",
      "The influencer is a symptom — the disease is older",
      "You cannot buy your way out of what consumption created",
      "The personal became commercial so gradually that reclaiming it feels naive",
      "Nothing here is trying to convert you",
      // diagnosis
      "We have called the symptoms a lifestyle",
      "Every era gets the numbness it deserves — this one is exceptionally loud",
      "The crisis is not approaching — it is the ambient condition",
      "Something is wrong and everyone knows it and almost no one says it plainly",
      "The collective pretense that this is fine is itself a form of exhaustion"
    ];

    // shuffle once on load
    for (let i = phrases.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [phrases[i], phrases[j]] = [phrases[j], phrases[i]];
    }

    const elA      = document.getElementById('phrase-a');
    const elB      = document.getElementById('phrase-b');
    const audio    = document.getElementById('ambient');
    const prompt   = document.getElementById('start-prompt');
    const footer   = document.getElementById('footer');
    const muteBtn  = document.getElementById('mute-btn');

    let index      = 0;
    let activeEl   = elA;
    let inactiveEl = elB;
    let started    = false;
    let muted      = false;

    function showNext() {
      const next = inactiveEl, prev = activeEl;
      next.textContent = phrases[index];
      index = (index + 1) % phrases.length;
      next.classList.add('active');
      prev.classList.remove('active');
      activeEl = next;
      inactiveEl = prev;
    }

    muteBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (!started) return;
      muted = !muted;
      audio.muted = muted;
      muteBtn.textContent = muted ? 'sound off' : 'sound on';
    });

    function begin() {
      if (started) return;
      started = true;

      prompt.classList.add('hidden');
      footer.classList.add('visible');
      muteBtn.classList.add('visible');

      audio.volume = 0;
      audio.play().catch(() => {});

      let vol = 0;
      const fade = setInterval(() => {
        vol = Math.min(vol + 0.008, 0.70);
        audio.volume = vol;
        if (vol >= 0.70) clearInterval(fade);
      }, 60);

      showNext();
      setInterval(showNext, 12000);
    }

    document.addEventListener('click', begin);
    document.addEventListener('touchstart', begin);
    document.addEventListener('keydown', begin);
  </script>

</body>
</html>
